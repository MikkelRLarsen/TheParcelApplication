# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parcel-postgres
  template:
    metadata:
      labels:
        app: parcel-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              value: "root"
            - name: POSTGRES_DB
              value: "parceldb"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: parcel-postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: parcel-postgres-storage
          persistentVolumeClaim:
            claimName: parcel-pvc